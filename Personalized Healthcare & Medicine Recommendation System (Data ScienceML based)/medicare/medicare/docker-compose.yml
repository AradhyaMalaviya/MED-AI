services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: medicare-ai:latest
    container_name: medicare_ai_web
    ports:
      - "5000:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
