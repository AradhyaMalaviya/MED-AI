services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: medicare-ai:latest
    container_name: medicare_ai_web
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      HOST: "0.0.0.0"
      PORT: "${PORT:-5000}"
      DEBUG: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${PORT}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
